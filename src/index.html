<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BELT Planner</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header id="header">
        <div class="header-top">
            <h1>BELT Planner</h1>
            <div class="header-controls">
                <label>
                    Days required:
                    <input type="number" id="days-required" min="1" max="5" value="3">
                </label>
                <button id="vacation-mode-btn">Vacation Mode: OFF</button>
            </div>
        </div>
        <div class="header-summary" id="summary">
            <span id="summary-text">Loading...</span>
        </div>
    </header>
    <main id="calendar-container"></main>
    <script src="app.js"></script>
</body>
</html>
